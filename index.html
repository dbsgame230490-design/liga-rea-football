<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football League Dashboard</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="topbar">
    <div class="league-info">
      <img
        src="https://dbsgame230490-design.github.io/liga-rea-football/liga-rea-2026.png"
        alt="League Logo"
        class="league-logo"
      />

      <div>
        <h1>Liga REA Football</h1>
        <p>2026 Season</p>
      </div>
    </div>
  </header>


  <!-- NAVIGATION -->
  <nav class="tabs">
    <button class="tab active" data-tab="matches">Matches</button>
    <button class="tab" data-tab="standings">Standings</button>
    <button class="tab" data-tab="stats">Stats</button>
    <button class="tab" data-tab="playoff">Playoff</button>
  </nav>


  <!-- CONTENT -->
  <main class="container">

    <!-- MATCHES -->
    <section id="matches" class="content active">

      <div class="match-grid" id="matchesContainer"></div>

    </section>


    <!-- STANDINGS -->
    <section id="standings" class="content">

      <div class="standings-tabs">
        <button class="standings-btn active" data-group="South">South</button>
        <button class="standings-btn" data-group="North">North</button>
        <button class="standings-btn" data-group="West">West</button>
        <button class="standings-btn" data-group="Mill">Mill</button>
      </div>

      <div class="table-card">

        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Team</th>
              <th>PTS</th>
              <th>MP</th>
              <th>W</th>
              <th>D</th>
              <th>L</th>
              <th>GF</th>
              <th>GA</th>
              <th>GD</th>
              <th>Last 5</th>
            </tr>
          </thead>

          <tbody id="standingsBody"></tbody>
        </table>

      </div>

    </section>


    <!-- STATS -->
    <section id="stats" class="content">

      <div class="stats-tabs">
        <button class="stats-btn active" data-type="goals">Goals</button>
        <button class="stats-btn" data-type="assists"> Assists</button>
        <button class="stats-btn" data-type="yellowcards"> Yellow Cards</button>
        <button class="stats-btn" data-type="redcards"> Red Cards</button>
      </div>


      <div class="stats-card">

        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th>Team</th>
              <!-- <th>Goals</th> -->
              <th id="statsValueTitle">Goals</th>
            </tr>
          </thead>

          <tbody id="statsBody"></tbody>
        </table>

      </div>

    </section>


    <!-- PLAYOFF -->
    <section id="playoff" class="content">

      <div class="playoff-wrapper" id="playoffWrapper"></div>

    </section>

  </main>


  <script type="module" src="script.js"></script>
</body>
</html>
